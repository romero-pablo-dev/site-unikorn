<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Unikorn Place — Espaces de coworking premium au cœur de Paris 11e. Bureaux privés, services hôteliers et communauté créative." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph (default — pages overwrite via SEO component) -->
    <meta property="og:title" content="Unikorn Place | Smart Working & Living for Creatives" />
    <meta property="og:description" content="Des espaces pensés pour la créativité et le bien-être — bureaux privés premium au cœur de Paris 11e." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:site_name" content="Unikorn Place" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <title>Unikorn Place | Smart Working & Living</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Inter:wght@200;300;400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

</head>

<body class="bg-base text-obsidian antialiased font-sans font-normal overflow-x-hidden">
    <!-- SVG Noise Filter (Context.md constraint) -->
    <svg class="pointer-events-none fixed inset-0 z-[9999] h-full w-full opacity-[0.05]"
        xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <!-- Formulaire statique pour la détection Netlify Forms (le vrai formulaire est dans BookingModal.jsx) -->
    <form name="reservation-visite" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="text" name="bot-field" />
        <input type="text" name="Prenom" />
        <input type="text" name="Nom" />
        <input type="email" name="Email" />
        <input type="text" name="Espace" />
        <textarea name="Message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
